name: pino test
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: code download
        uses: actions/checkout@v4

      - name: show files
        run: ls -r
        
      - name: magari reading
        run: cat magari.txt

      - name: Ejecutar mi script bash
        run: bash script.sh
        
      - name: ¿Quién soy y dónde estoy?
        run: |
          echo "El usuario que lanzó esto es: ${{ github.actor }}"
          echo "Estamos en la rama: ${{ github.ref }}"
          echo "El nombre del repositorio es: ${{ github.repository }}"

