name: pino test
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: code download
        uses: actions/checkout@v4

      - name: show files
        run: ls -r
        
      - name: magari reading
        run: cat magari.txt

      - name: Ejecutar mi script bash
        run: bash script.sh
        
      - name: Generar un resumen real
        uses: actions/github-script@v7
        with:
          script: |
            await core.summary
              .addHeading('¡Informe de pino test!')
              .addRaw('Hola **${{ github.actor }}**, este flujo ha funcionado perfecto.')
              .write()

      - name: Crear el archivo
        run: echo "Este es el contenido del artefacto" > resultado_final.txt
      
      - name: Subir el archivo a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mi-archivo-descargable # El nombre que tendrá el paquete
          path: ./resultado_final.txt
          if-no-files-found: error
