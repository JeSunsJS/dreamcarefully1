name: pino test
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: code download
        uses: actions/checkout@v4

      - name: show files
        run: ls -r
        
      - name: magari reading
        run: cat magari.txt

      - name: Ejecutar mi script bash
        run: bash script.sh
        
      - name: Generar un saludo automático
        uses: actions/github-script@v7
        with:
          script: |
            core.summary
              .addHeading('¡Informe de pino test!')
              .addText('Hola ${{ github.actor }}, este resumen se ha creado con una Action oficial.')
              .write()
