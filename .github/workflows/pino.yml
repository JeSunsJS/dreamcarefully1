name: pino test
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - name: code download
        uses: actions/checkout@v4

      - name: show files
        run: ls -r
        
      - name: magari reading
        run: cat magari.txt

      - name: Ejecutar mi script bash
        run: bash script.sh
        
      - name: Crear un resumen bonito
        # Este es el "Template" de alguien más
        uses: test-summary/action@v2
        if: always() # Queremos que esto pase siempre, incluso si algo falla arriba
        with:
          paths: "no_hay_tests_todavia.xml" # No te preocupes por esto ahora

